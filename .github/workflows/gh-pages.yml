name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
    paths-ignore:
      - "images/**"
      - "LICENSE"
      - "README.md"
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  HUGO_VERSION: 0.160.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Hugo
        run: |
          set -euo pipefail

          case "$(dpkg --print-architecture)" in
            amd64) HUGO_ARCH="amd64" ;;
            arm64) HUGO_ARCH="arm64" ;;
            *)
              echo "::error::Unsupported runner architecture: $(dpkg --print-architecture)"
              exit 1
              ;;
          esac

          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-${HUGO_ARCH}.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-${HUGO_ARCH}.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-${HUGO_ARCH}.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
          hugo version
          
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Build
        run: |
          hugo \
            --minify \
            --destination public \
            --baseURL ${{ steps.pages.outputs.base_url }}
          touch public/.nojekyll

      - name: Verify math rendering assets
        run: |
          ZCASH_PAGE="public/blog/privacy/zcash-protocol/index.html"
          if [ -f "$ZCASH_PAGE" ]; then
            if ! grep -q 'katex.min.js' "$ZCASH_PAGE"; then
              echo "::error::KaTeX JS not found in Zcash protocol page"
              exit 1
            fi
            if ! grep -q 'katex.min.css' "$ZCASH_PAGE"; then
              echo "::error::KaTeX CSS not found in Zcash protocol page"
              exit 1
            fi
            if ! grep -q 'katex-init.js' "$ZCASH_PAGE"; then
              echo "::error::KaTeX init script not found in Zcash protocol page"
              exit 1
            fi
            if grep -q 'renderMathInElement' "$ZCASH_PAGE"; then
              echo "::error::Inline renderMathInElement found; math init must be in external JS"
              exit 1
            fi
            echo "Math rendering assets verified (no inline scripts)"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
